name: release

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Release type'
        required: false
        default: 'auto'
        type: choice
        options: [auto, major, minor, patch]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Release
        un: bunx fuman-build release --help