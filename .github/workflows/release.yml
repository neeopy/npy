name: release

on:
  workflow_dispatch:
    inputs:
      kind:
        description: 'Release kind'
        required: false
        default: 'auto'
        type: choice
        options: [auto, major, minor, patch]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Install dependencies
        run: bun install

      - name: Build vite plugin
        run: bunx esbuild ./node_modules/@fuman/build/vite/build-plugin.js --bundle --external:tinyglobby --platform=node --format=esm --outfile=./node_modules/@fuman/build/dist_vite-internal.js --log-level=error

      - name: Release
        run: bunx fuman-build release --kind ${{ inputs.kind }} --with-npm --npm-token ${{ secrets.NPM_TOKEN }} --with-github-release --github-token ${{ secrets.GITHUB_TOKEN }}